spring.application.name=car-dealership

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/car_dealership_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=cardealership_jwt_secret_key_2024_very_long_key_for_security_256_bits_minimum
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:4200

# Server
server.port=8080
